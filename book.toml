[book]
title = "Embedded C Codebase Architecture"
authors = ["Embedded Systems Engineering"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/your-org/embedded-c-architecture"
edit-url-template = "https://github.com/your-org/embedded-c-architecture/edit/main/{path}"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
